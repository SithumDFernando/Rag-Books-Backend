openapi: 3.0.3
info:
  title: Self-Help Books RAG API
  description: API specification for the backend of the Self-Help Books RAG system.
  version: 1.0.0
servers:
  - url: http://localhost:8000
    description: Local development server

paths:
  /api/books/upload:
    post:
      summary: Upload and ingest a self-help book
      description: |
        Uploads a PDF or EPUB file. The system's Guardrails will first analyze the
        document. If it is fictional or unrelated to self-help, it will be rejected.
        Otherwise, it will be chunked, embedded, and stored in ChromaDB and SQLite.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                  description: The self-help book file (PDF/EPUB)
              required:
                - file
      responses:
        '200':
          description: Successfully ingested book
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookMetadata'
        '400':
          description: Bad request (e.g., unsupported file format)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Ingestion Guardrail Rejection (e.g., fictional book)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error

  /api/books:
    get:
      summary: List all ingested books
      description: Returns a list of metadata for all books currently in the knowledge base.
      responses:
        '200':
          description: A list of books
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/BookMetadata'

  /api/books/{book_id}:
    delete:
      summary: Delete a book from the knowledge base
      description: Removes the book's chunks from ChromaDB and its metadata from SQLite.
      parameters:
        - name: book_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Successfully deleted book
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
        '404':
          description: Book not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/chat:
    post:
      summary: Ask a question or request a summary
      description: |
        Routes the user's query using LangGraph. If it's a specific question, retrieves
        context via RAG. If it's a summary request, utilizes map-reduce/refine strategies.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatRequest'
      responses:
        '200':
          description: Successful response from the LLM
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatResponse'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error

components:
  schemas:
    BookMetadata:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        filename:
          type: string
        status:
          type: string
          enum: [processing, completed, failed]
        ingested_at:
          type: string
          format: date-time
      required:
        - id
        - title
        - filename
        - status
        - ingested_at

    ChatRequest:
      type: object
      properties:
        query:
          type: string
          description: The user's question or summary request.
        book_id:
          type: string
          format: uuid
          description: Optional. If provided, restricts the context to this specific book.
          nullable: true
        session_id:
          type: string
          description: Optional. Used to maintain chat history.
          nullable: true
      required:
        - query

    ChatResponse:
      type: object
      properties:
        answer:
          type: string
          description: The markdown-formatted response from the LLM.
        sources:
          type: array
          description: Optional. List of sources/chunks used to generate the answer.
          items:
            type: string
        workflow_type:
          type: string
          enum: [qa, summary]
          description: The path chosen by the LangGraph orchestrator.
      required:
        - answer
        - workflow_type

    ErrorResponse:
      type: object
      properties:
        detail:
          type: string
          description: Human-readable error message.
        code:
          type: string
          description: Specific error code, e.g., 'GUARDRAIL_REJECTION', 'FILE_UNSUPPORTED'
      required:
        - detail
        - code
